@if (active()) {
  <div
    class="flex flex-col items-center justify-center gap-3"
    [class]="paddingClass()"
    aria-live="polite"
    aria-busy="true"
  >
    <span [class]="spinnerClass()"></span>
    @if (label()) {
      <p class="text-sm tracking-wide text-base-content/60">{{ label() }}</p>
    }
  </div>
}
