<button
  type="button"
  class="btn btn-ghost btn-sm h-auto min-h-0 gap-1.5 px-2 py-1 -ms-1 font-semibold normal-case text-inherit hover:bg-base-200/80"
  [attr.aria-label]="ariaLabel()"
  (click)="onClick()"
>
  <span>{{ label() }}</span>
  @if (activeKey() === columnKey()) {
    @if (direction() === 'asc') {
      <app-icon name="arrow-up" sizeClass="h-4 w-4 shrink-0 text-primary" />
    } @else {
      <app-icon name="arrow-down" sizeClass="h-4 w-4 shrink-0 text-primary" />
    }
  } @else {
    <app-icon name="arrows-up-down" sizeClass="h-3.5 w-3.5 shrink-0 opacity-45" />
  }
</button>
