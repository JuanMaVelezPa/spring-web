@if (ui.toasts().length > 0) {
  <div class="toast toast-end toast-top z-50 pt-[max(0.5rem,env(safe-area-inset-top,0px))]">
    @for (item of ui.toasts(); track item.id) {
      <div class="alert shadow-md" [class]="toastClass(item)">
        <span>{{ item.message }}</span>
        <button
          type="button"
          class="btn btn-ghost btn-xs"
          aria-label="Dismiss"
          (click)="ui.dismiss(item.id)"
        >
          ✕
        </button>
      </div>
    }
  </div>
}
