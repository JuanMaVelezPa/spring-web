<div class="flex min-h-screen flex-col bg-base-200 pt-[env(safe-area-inset-top,0px)]">
  <div
    class="mx-auto flex w-full max-w-md flex-1 flex-col justify-center gap-6 px-4 py-6 sm:py-8 min-h-0"
  >
    <div class="flex items-start justify-between gap-3 sm:gap-4">
      <h1 class="min-w-0 text-2xl font-semibold leading-tight">{{ i18n.t('loginTitle') }}</h1>
      <div class="shrink-0 pt-0.5">
        <app-settings-dropdown />
      </div>
    </div>
    <app-inline-alert [message]="sessionNotice()" variant="info" [title]="i18n.t('sessionTitle')" />
    <app-inline-alert [message]="error()" variant="error" [title]="i18n.t('signInFailed')" />
    <app-busy-section
      class="rounded-2xl"
      [busy]="submitting()"
      [label]="i18n.t('signingIn')"
      spinnerSize="sm"
    >
      <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
        <label class="form-control w-full">
          <span class="label-text">{{ i18n.t('username') }}</span>
          <input
            class="input input-bordered w-full"
            type="email"
            formControlName="username"
            autocomplete="email"
            data-testid="login-username"
          />
        </label>
        <label class="form-control w-full">
          <span class="label-text">{{ i18n.t('password') }}</span>
          <input
            class="input input-bordered w-full"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            data-testid="login-password"
          />
        </label>
        <button
          type="submit"
          class="btn btn-primary gap-2"
          [disabled]="form.invalid || submitting()"
          data-testid="login-submit"
        >
          @if (submitting()) {
            <app-loading-spinner size="xs" />
          }
          {{ i18n.t('login') }}
        </button>
      </form>
    </app-busy-section>
  </div>
  <app-footer />
</div>
