<div class="flex min-h-screen flex-col bg-base-200 pt-[env(safe-area-inset-top,0px)]">
  <div
    class="mx-auto flex w-full max-w-md flex-1 flex-col justify-center gap-6 px-4 py-6 sm:py-8 min-h-0"
  >
    <div class="flex items-start justify-between gap-3 sm:gap-4">
      <h1 class="min-w-0 text-2xl font-semibold leading-tight">Sign in</h1>
      <div class="shrink-0 pt-0.5">
        <app-theme-toggle />
      </div>
    </div>
    <app-inline-alert [message]="sessionNotice()" variant="info" title="Session" />
    <app-inline-alert [message]="error()" variant="error" title="Sign-in failed" />
    <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
      <label class="form-control w-full">
        <span class="label-text">Username</span>
        <input class="input input-bordered w-full" type="text" formControlName="username" autocomplete="username" />
      </label>
      <label class="form-control w-full">
        <span class="label-text">Password</span>
        <input
          class="input input-bordered w-full"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </label>
      <app-loading-state [active]="submitting()" label="Signing in…" size="sm" />
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting()">Login</button>
    </form>
  </div>
  <app-footer />
</div>
