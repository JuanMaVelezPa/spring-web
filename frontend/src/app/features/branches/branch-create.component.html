<div class="mx-auto flex max-w-lg flex-col gap-4">
  <div class="flex items-center gap-2">
    <a routerLink="/branches" class="btn btn-ghost btn-sm">Back</a>
    <h1 class="text-2xl font-semibold">New branch</h1>
  </div>
  <app-inline-alert [message]="error()" variant="error" title="Could not create branch" />
  <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
    <label class="form-control w-full">
      <span class="label-text">Code</span>
      <input class="input input-bordered w-full" formControlName="code" />
      <span class="label-text-alt text-xs opacity-70">Letters, numbers, underscore, hyphen</span>
    </label>
    <label class="form-control w-full">
      <span class="label-text">Name</span>
      <input class="input input-bordered w-full" formControlName="name" />
    </label>
    <label class="form-control w-full">
      <span class="label-text">City</span>
      <input class="input input-bordered w-full" formControlName="city" />
    </label>
    <app-loading-state [active]="saving()" label="Saving branch…" size="sm" />
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving()">
      Create
    </button>
  </form>
</div>
