<div class="flex flex-col gap-4">
  <div class="flex flex-wrap items-center justify-between gap-2">
    <h1 class="text-2xl font-semibold">Branches</h1>
    <a routerLink="/branches/new" class="btn btn-primary btn-sm">New branch</a>
  </div>

  <app-inline-alert [message]="error()" variant="warning" title="Something went wrong" />

  <app-loading-state [active]="loading()" label="Loading branches…" size="md" />

  @if (!loading() && data()) {
    @if (data()!.content.length === 0) {
      <div class="rounded-lg border border-dashed border-base-300 bg-base-100/60 px-6 py-10 text-center text-sm text-base-content/60">
        No branches yet. Create one to get started.
      </div>
    } @else {
      <div class="overflow-x-auto rounded-lg border border-base-300/80 bg-base-100 shadow-sm">
        <table class="table table-zebra">
          <thead>
            <tr>
              <th>Code</th>
              <th>Name</th>
              <th>City</th>
              <th>Active</th>
            </tr>
          </thead>
          <tbody>
            @for (b of data()!.content; track b.id) {
              <tr>
                <td class="font-mono text-sm">{{ b.code }}</td>
                <td>{{ b.name }}</td>
                <td>{{ b.city }}</td>
                <td>{{ b.isActive ? 'Yes' : 'No' }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }

    <app-page-nav
      [page]="page()"
      [pageSize]="pageSize()"
      [totalPages]="data()!.totalPages"
      [totalElements]="data()!.totalElements"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</div>
