services:
  app:
    environment:
      SPRING_PROFILES_ACTIVE: docker,prod
      APP_SECURITY_ACTUATOR_PUBLIC: "false"

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:?GF_SECURITY_ADMIN_USER is required in .env.prod}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required in .env.prod}
