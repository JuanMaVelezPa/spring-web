spring.application.name=spring-web
logging.config=classpath:logback-spring.xml
logging.file.path=${LOG_PATH:logs}
logging.level.root=${ROOT_LOG_LEVEL:INFO}
logging.level.com.jm.spring_web=${APP_LOG_LEVEL:INFO}
logging.level.com.jm.spring_web.infrastructure.logging.RequestAccessLogFilter=${HTTP_ACCESS_LOG_LEVEL:INFO}
logging.level.org.apache.kafka=${KAFKA_LOG_LEVEL:WARN}
logging.level.org.springframework.kafka=${SPRING_KAFKA_LOG_LEVEL:WARN}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/companydb}
spring.datasource.username=${DB_USERNAME:company}
spring.datasource.password=${DB_PASSWORD:company}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=${KAFKA_PRODUCER_RETRIES:2147483647}
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:rrhh-notifier}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.isolation.level=read_committed

app.kafka.topics.hr-notifications=${KAFKA_HR_TOPIC:hr-new-branch-notifications}
app.notifications.enabled=${APP_NOTIFICATIONS_ENABLED:true}
app.outbox.relay.fixed-delay-ms=${OUTBOX_RELAY_DELAY_MS:5000}
app.kafka.hr-consumer.retry-attempts=${KAFKA_HR_RETRY_ATTEMPTS:4}
app.kafka.hr-consumer.retry-delay-ms=${KAFKA_HR_RETRY_DELAY_MS:1000}
app.kafka.hr-consumer.retry-multiplier=${KAFKA_HR_RETRY_MULTIPLIER:2.0}
app.kafka.hr-consumer.retry-max-delay-ms=${KAFKA_HR_RETRY_MAX_DELAY_MS:30000}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
app.security.actuator-public=${APP_SECURITY_ACTUATOR_PUBLIC:true}

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
security.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:1209600}
security.jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:REFRESH_TOKEN}
security.cookies.secure=${SECURITY_COOKIES_SECURE:false}
security.default-user.username=${APP_USER:admin}
# Default matches root `.env.example` so local runs without exporting APP_PASSWORD match the documented login.
security.default-user.password=${APP_PASSWORD:Admin_ChangeMe_2026!}
